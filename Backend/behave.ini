[behave]
# Prevents prints or logging statements inside passing steps from cluttering the terminal output
stdout_capture = true
stderr_capture = true
log_capture    = true

# Sets the default terminal reporting layout.
# "pretty" prints features and steps nicely with colored passing marks
format = pretty

# Stop executing the entire test suite immediately upon hitting the first failure
stop = false

# Defines standard directories Behave should sweep for features (defaults to 'features')
# paths = features

# Define explicit user-defined text parameter mappings or environment tags
[behave.userdata]
browser = chromium